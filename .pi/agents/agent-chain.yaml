# ── Workflows ────────────────────────────────────────────────────────────────
# Use /chain to pick a workflow at runtime.
# optional: true steps are skipped when fast=true is passed to run_chain.

# recon: deep codebase exploration
recon:
  description: "Deep codebase recon — explore, validate, generate SYSTEM-MAP.html"
  steps:
    - agent: robin
      prompt: |
        Deep recon for: $INPUT

        Pass 1 — Explore: key files, entry points, data flow, dependencies, architecture.
        Pass 2 — Validate: cross-check findings, fill gaps, map components and connections.
        Pass 3 — Map: generate SYSTEM-MAP.html using Mermaid.js (CDN). Show components, data flow, external deps, entry points. Include legend.

        Finish: update PROGRESS.md with findings.

# research: multi-pass deep research with validation
research:
  description: "Multi-pass research — Robin explores, Benn validates, Vegapunk synthesises"
  steps:
    - agent: robin
      prompt: "Deep research on: $INPUT\n\nBreak into sub-questions. For each: investigate, gather evidence, cite files and patterns."
    - agent: benn-beckman
      prompt: "Stress-test this research. Check data, challenge assumptions, find gaps. Are conclusions supported?\n\n$INPUT\n\nOriginal: $ORIGINAL"
    - agent: vegapunk
      optional: true
      prompt: "Final synthesis. Sound analysis? Research online for additional context. Concrete next steps. Append to PROGRESS.md.\n\n$INPUT\n\nOriginal: $ORIGINAL"

# audit: security review
audit:
  description: "Security audit — Jinbe finds, Law validates, Robin mitigates"
  steps:
    - agent: jinbe
      prompt: "Security audit of: $INPUT\n\nOWASP Top 10, input validation, secrets, access controls, deps. Rate each finding by severity."
    - agent: law
      prompt: "Review findings. Valid? Anything missed? Prioritize.\n\n$INPUT\n\nOriginal: $ORIGINAL"
    - agent: robin
      prompt: "Research mitigations for each finding. Actionable remediation with code examples. Append to PROGRESS.md.\n\n$INPUT\n\nOriginal: $ORIGINAL"

# board-prd: CEO-board PRD workflow
board-prd:
  description: "CEO-Board PRD — Robin briefs, Vegapunk web-researches, Law analyses, Robin produces final PRD.md"
  steps:
    - agent: robin
      prompt: "You are briefing your board on this topic. Research it thoroughly — read the codebase, understand the problem space, identify unknowns. Produce a structured brief covering: context, problem statement, key unknowns, and the questions you want the board to weigh in on.\n\nTopic: $INPUT"
    - agent: vegapunk
      prompt: "You are the board's research director. Robin has briefed you. Search the web for: current best practices, competing solutions, relevant research, industry standards, and anything Robin may have missed.\n\nRobin's brief: $INPUT\n\nOriginal topic: $ORIGINAL"
    - agent: law
      prompt: "You are the board's analytical strategist. Challenge assumptions, identify risks, evaluate trade-offs, stress-test the approaches. Rate each option by feasibility, risk, and strategic fit.\n\nBrief + research: $INPUT\n\nOriginal topic: $ORIGINAL"
    - agent: robin
      prompt: "Synthesise everything into a final PRD. Include: Executive Summary, Problem Statement, Goals and Non-Goals, User Stories (prioritised), Technical Approach, Risks and Mitigations, Open Questions, Success Metrics, Phase Breakdown. Write to PRD.md.\n\nBoard findings: $INPUT\nOriginal topic: $ORIGINAL"

# ── Harness Chains ────────────────────────────────────────────────────────
# Dispatcher interviews you before run_chain. Full spec flows in as $INPUT.

# harness-build: board planning phase + TDD build + evaluator loop + Brook docs
build:
  description: "Full harness — board planning (Robin → Vegapunk → Law → Robin PLAN.md), Usopp tests, Zoro builds with evaluator loop, Brook writes README"
  steps:
    - agent: robin
      prompt: |
        You are the research lead. Orient yourself, then brief the board.

        1. Git hygiene — do this first:
           Run: `git status 2>/dev/null || echo "no git"`
           - If no git: `git init && git checkout -b main`
             If an origin URL is in the spec: `git remote add origin <URL>`
             This is a NEW project — commit directly to main throughout.
           - If git exists:
             `git fetch origin 2>/dev/null || true`
             `git checkout main 2>/dev/null || git checkout master 2>/dev/null || true`
             `git pull origin main 2>/dev/null || git pull origin master 2>/dev/null || true`
             Check if this is a new or existing project:
             Run: `git log --oneline -1 2>/dev/null || echo "no commits"`
             - If no commits or only 1 init commit: NEW project — work on main directly
             - If existing commits: EXISTING project — create a feature branch:
               `git checkout -b feat/YYYYMMDD-<short-description>`
               (use today's date, kebab-case description from the spec)
             Store whether this is new or existing — Brook will need to know.

        2. Read CLAUDE.md if it exists — understand the project context and conventions
        3. Read any relevant existing files mentioned in the spec

        4. Research the problem space thoroughly:
           - For a new feature: understand the existing codebase, where this fits, what it touches
           - For a new project: understand the domain, constraints, and what needs to be built

        5. Write a structured board brief covering:
           - Context (what exists, what's being added/built)
           - Whether this is a NEW or EXISTING project (important for Brook)
           - Problem statement and goals
           - Proposed approach and tech stack
           - Key unknowns and risks
           - Specific questions for Vegapunk (architecture/research) and Law (strategy/trade-offs)

        Spec: $INPUT
    - agent: vegapunk
      prompt: "You are the board's research director. Robin has briefed you on this project. Search the web for: best practices for this stack, competing solutions, relevant libraries, known pitfalls, and anything that should influence the architecture. Bring external knowledge.\n\nRobin's brief: $INPUT\n\nOriginal spec: $ORIGINAL"
    - agent: law
      prompt: "You are the board's analytical strategist. You have Robin's brief and Vegapunk's research. Analyse the proposed approach: challenge assumptions, identify risks, evaluate trade-offs, stress-test the plan. Rate feasibility and flag anything that would cause problems during implementation.\n\nBrief + research: $INPUT\n\nOriginal spec: $ORIGINAL"
    - agent: robin
      prompt: "You've heard from your board. Vegapunk brought external research, Law provided analytical critique. Now synthesise everything into a final PLAN.md — atomic testable tasks, implementation order, test guidance, and phase breakdown. Address every risk Law flagged. Commit the plan: git add -A && git commit -m \"plan: board-reviewed PLAN.md\"\n\nBoard findings: $INPUT\nOriginal spec: $ORIGINAL"
    - agent: usopp
      prompt: |
        Write failing tests for every task in PLAN.md.

        IMPORTANT: Read PLAN.md directly from disk — do not rely solely on the context passed to you,
        as it may be truncated. Run: read the file at PLAN.md.

        Then:
        1. For every task in PLAN.md, write tests covering happy paths, edge cases, and error states
        2. Run the test suite — ALL new tests MUST FAIL (no implementation yet)
        3. If any test passes immediately, it is wrong — fix it so it fails
        4. Commit: git add -A && git commit -m "test: failing tests for all tasks"
        5. Report: X tests written, all failing as expected

        Original spec: $ORIGINAL
    - generator: zoro
      evaluator: evaluator
      generator_prompt: "Implement until all tests pass. Work one task at a time. Run full suite before finishing. Commit each completed task: git add -A && git commit -m \"feat: <task name>\"\n\nSpec: $ORIGINAL\nTests and plan: $INPUT\n\nPrevious evaluator critique:\n$CRITIQUE"
      evaluator_prompt: "Evaluate the implementation strictly. Run tests. Check for stubs, missing features, code quality issues.\n\nOriginal spec: $ORIGINAL\nImplementation: $INPUT"
      max_iterations: 5
      pass_threshold: 8
    - agent: usopp
      prompt: |
        Zoro has finished implementing. Run the full test suite and verify everything is green.

        1. Read PLAN.md — confirm every task has test coverage
        2. Run ALL tests:
           - Unit/integration: npm test, bun test, pytest — whatever the project uses
           - Frontend/E2E: npx playwright test (if frontend exists)
        3. For any failing tests: do NOT fix the implementation yourself — document exactly what failed and why
        4. Report clearly:
           - Total tests: X
           - Passed: X
           - Failed: X (list them with error messages)
           - Coverage: X% (if available)
        5. If all pass: "✅ All X tests passing — ready for review"
        6. If any fail: "❌ X tests failing — Zoro needs to fix before merge"

        Spec: $ORIGINAL
        Build output: $INPUT
    - agent: brook
      prompt: |
        The build is complete. Update documentation and finalise git.

        1. CLAUDE.md (always) — read existing first, then surgically update:
           - What this project is and what was just added/changed
           - Tech stack and conventions
           - Key files and their roles
           - How to run and test
           - Current state

        2. README.md — check if it exists:
           - If NO README: write a full one (name, description, stack, install, run, test, env vars, structure)
           - If README EXISTS: surgically update only the sections affected by this build. Preserve everything else.

        3. Commit: git add -A && git commit -m "docs: update README and CLAUDE.md"

        4. Git finalisation — check whether this was a NEW or EXISTING project (Robin noted this in the build output):
           - NEW project (no prior commits when Robin started):
             Push to main: git push -u origin main
             No PR needed.
           - EXISTING project (had commits, Robin created a feat/ branch):
             Push branch: git push -u origin HEAD
             Create PR: gh pr create --title "<feature title from spec>" --body "<summary of what was built, how to run it, what changed>"
             Print the PR URL clearly.

        Spec: $ORIGINAL
        Build output: $INPUT

# harness-cr: change request — new branch, implement with evaluator loop, push + PR
cr:
  description: "Change request — Robin branches + scopes, Zoro implements with evaluator loop, Brook pushes and creates PR"
  steps:
    - agent: robin
      prompt: |
        You are implementing a change request on an existing codebase.

        1. Git hygiene — do this first:
           `git fetch origin 2>/dev/null || true`
           `git checkout main 2>/dev/null || git checkout master 2>/dev/null || true`
           `git pull origin main 2>/dev/null || git pull origin master 2>/dev/null || true`
           This ensures you start from the latest main, not a stale branch.

        2. Read CLAUDE.md if it exists — understand conventions and current state
        3. Read relevant files to understand what needs to change

        4. Create a new branch for this CR:
           - Branch name format: cr/YYYYMMDD-<short-description> (use today's date, kebab-case description)
           - Run: git checkout -b cr/<branch-name>

        4. Write a concise implementation plan:
           - What to change and why
           - What to preserve (don't break)
           - What tests need updating or adding
           - Definition of done

        5. Commit the plan: git add PLAN.md && git commit -m "chore: CR plan"

        CR: $INPUT
    - generator: zoro
      evaluator: evaluator
      generator_prompt: "Implement this CR precisely. Follow existing patterns. Don't break anything else. Commit each meaningful change: git add -A && git commit -m \"<type>: <description>\"\n\nCR: $ORIGINAL\nPlan: $INPUT\n\nPrevious evaluator critique:\n$CRITIQUE"
      evaluator_prompt: "Evaluate this CR implementation. Does it do exactly what was asked? Does it break anything? Run tests. Is the git history clean?\n\nOriginal CR: $ORIGINAL\nImplementation: $INPUT"
      max_iterations: 3
      pass_threshold: 8
    - agent: brook
      prompt: |
        The change request implementation is complete and the evaluator has approved it.

        1. Run the full test suite one final time and confirm it passes
        2. Push the branch: git push -u origin HEAD
        3. Create a pull request using gh CLI if available:
           gh pr create --title "<CR title>" --body "<summary of changes>"
           If gh is not available, output the exact URL to create the PR manually.
        4. Print the PR URL or creation instructions clearly.
        5. Update CLAUDE.md if any conventions or architecture changed.
        6. Append a summary to progress/YYYYMMDD.md (create if needed).

        CR: $ORIGINAL
        Implementation summary: $INPUT
